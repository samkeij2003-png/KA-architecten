name: Deploy naar GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Installeer dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Live CMS-URL komt uit repo-secret. Leeg = cms.ts valt terug op
          # localhost en geeft een lege array, build blijft groen.
          CMS_URL: ${{ secrets.CMS_URL }}
          CMS_SITE_SLUG: ka-architecten

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
